  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --forest: #2c4a2e;
      --leaf: #4a7c59;
      --cream: #faf8f3;
      --warm: #8b6914;
      --border: #e8e0d0;
      --text: #2a2a2a;
    }
    body {
      font-family: 'Jost', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      text-align: center;
      max-width: 520px;
      width: 100%;
    }
    .logo-wrap {
      margin-bottom: 2rem;
    }
    .logo-wrap img {
      width: 90px;
      height: 90px;
      object-fit: contain;
    }
    .code {
      font-family: 'Playfair Display', serif;
      font-size: clamp(5rem, 20vw, 8rem);
      font-weight: 800;
      color: var(--leaf);
      line-height: 1;
      letter-spacing: -2px;
      margin-bottom: .5rem;
    }
    .title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.2rem, 4vw, 1.6rem);
      font-weight: 600;
      color: var(--forest);
      margin-bottom: 1rem;
    }
    .msg {
      font-size: .95rem;
      color: #666;
      line-height: 1.7;
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-block;
      background: var(--forest);
      color: #fff;
      text-decoration: none;
      padding: .85rem 2.2rem;
      border-radius: 4px;
      font-family: 'Jost', sans-serif;
      font-size: .85rem;
      font-weight: 500;
      letter-spacing: .6px;
      text-transform: uppercase;
      transition: background .25s, transform .2s;
    }
    .btn:hover {
      background: var(--leaf);
      transform: translateY(-1px);
    }
    .divider {
      width: 48px;
      height: 2px;
      background: var(--leaf);
      margin: 1.5rem auto;
      border-radius: 2px;
    }
    .tagline {
      font-size: .78rem;
      color: #aaa;
      letter-spacing: .5px;
      margin-top: 2.5rem;
      text-transform: uppercase;
    }
  </style>
